workflows:
  android-production:
    name: Android Production
    max_build_duration: 60
    environment:
      node: 20.17.0
      vars:
        EXPO_PUBLIC_API_URL: $EXPO_PUBLIC_API_URL
        EXPO_PUBLIC_SUPABASE_URL: $EXPO_PUBLIC_SUPABASE_URL
        EXPO_PUBLIC_SUPABASE_ANON_KEY: $EXPO_PUBLIC_SUPABASE_ANON_KEY
        EXPO_PUBLIC_RC_ANDROID_KEY: $EXPO_PUBLIC_RC_ANDROID_KEY
        EXPO_PUBLIC_RC_IOS_KEY: $EXPO_PUBLIC_RC_IOS_KEY
        EXPO_PUBLIC_BILLING_URL: $EXPO_PUBLIC_BILLING_URL
      android_signing:
        - hemensalon_keystore
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android
        script: |
          npx eas build --platform android --profile production --non-interactive --local --output app-release.aab
    artifacts:
      - app-release.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
