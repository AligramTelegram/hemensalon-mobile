workflows:
  android-production:
    name: Android Production
    max_build_duration: 60
    environment:
      node: 20.17.0
      groups:
        - andriod
      android_signing:
        - hemensalon_keystore
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android
        script: |
          npx eas build --platform android --profile production --non-interactive --local --output app-release.aab
    artifacts:
      - app-release.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
